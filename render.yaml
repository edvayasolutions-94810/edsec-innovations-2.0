services:
  - type: web
    name: edsec-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # set this in Render dashboard — paste your MongoDB Atlas URI
      - key: MONGO_URI
        sync: false   # same Atlas URI
      - key: JWT_SECRET
        sync: false   # set a strong secret in Render dashboard
